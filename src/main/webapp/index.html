<!DOCTYPE html>
<html lang="en">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Grocery Store</title>

<style>

body{
margin:0;
font-family:Arial;
background:#f5f5f5;
}

/* Header */

header{
background:#2ecc71;
color:white;
display:flex;
justify-content:space-between;
align-items:center;
padding:15px 40px;
}

.logo{
font-size:24px;
font-weight:bold;
}

#search{
padding:8px;
width:300px;
border-radius:5px;
border:none;
}

/* Products */

.products{
padding:40px;
}

.product-grid{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(200px,1fr));
gap:20px;
}

.product{
background:white;
padding:15px;
border-radius:10px;
text-align:center;
box-shadow:0 4px 10px rgba(0,0,0,0.1);
}

.product img{
width:100%;
height:150px;
object-fit:cover;
}

.product:hover{
transform:scale(1.05);
transition:0.3s;
}

button{
background:#2ecc71;
color:white;
border:none;
padding:8px 15px;
border-radius:5px;
cursor:pointer;
}

/* Footer */

footer{
background:#333;
color:white;
text-align:center;
padding:20px;
margin-top:40px;
}

</style>

</head>


<body>

<header>

<div class="logo">Fresh Grocery</div>

<input id="search" onkeyup="searchProduct()" placeholder="Search products...">

<div>
🛒 Cart (<span id="cart-count">0</span>)
</div>

</header>


<section class="products">

<h2>Our Products</h2>

<div class="product-grid">


<div class="product">

<img src="https://tse3.mm.bing.net/th/id/OIP.cygmBEKqzUFFj3sHSFTf6AHaHa?pid=Api&P=0&h=180">

<h3>Apple</h3>

<p>₹120</p>

<button onclick="addCart()">Add to Cart</button>

</div>


<div class="product">

<img src="https://images.unsplash.com/photo-1580910051074-3eb694886505">

<h3>phone</h3>

<p>₹50</p>

<button onclick="addCart()">Add to Cart</button>

</div>


<div class="product">

<img src="https://images.unsplash.com/photo-1604908176997-125f25cc6f3d">

<h3>mixer</h3>

<p>₹30</p>

<button onclick="addCart()">Add to Cart</button>

</div>


<div class="product">

<img src="https://images.unsplash.com/photo-1610832958506-aa56368176cf">

<h3>mixfruit</h3>

<p>₹40</p>

<button onclick="addCart()">Add to Cart</button>

</div>


</div>

</section>


<footer>

<p>© 2026 Grocery Store</p>

</footer>


<script>

let cart=0;

function addCart(){

cart++;

document.getElementById("cart-count").innerText=cart;

}

function searchProduct(){

let input=document.getElementById("search").value.toLowerCase();

let products=document.querySelectorAll(".product");

products.forEach(product=>{

let name=product.innerText.toLowerCase();

if(name.includes(input)){

product.style.display="block";

}else{

product.style.display="none";

}

});

}

</script>

</body>
</html>
